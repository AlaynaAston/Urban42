<div class="container">
  <h1>Log In</h1>

  <form id="loginForm">
    <input type="email" placeholder="Email address" required>
    <input type="password" placeholder="Password" required>

    <div class="remember-wrapper">
      <label>
        <input type="checkbox">
        Keep me signed in
      </label>
    </div>

    <button type="submit">Log In</button>
  </form>

  <p style="text-align:center; margin-top:15px;">
    New here? <a href="signup.html">Create an account</a>
  </p>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const email = this.querySelector("input[type='email']").value.trim();
  const password = this.querySelector("input[type='password']").value;

  if (!email.includes("@")) {
    alert("Please enter a valid email address.");
    return;
  }

  if (password.length < 6) {
    alert("Password must be at least 6 characters.");
    return;
  }

  alert("Login validation complete (demo mode).");
});
</script>

<!-- ================= CHATBOX ================= -->
<div class="u42-chat-system">

  <div class="u42-chat-toggle" onclick="toggleChat()">💬</div>

  <div class="u42-chatbox" id="chatbox">
    <div class="u42-chat-header">
      Urban 42 Support
      <span onclick="toggleChat()">✕</span>
    </div>

    <div class="u42-chat-messages" id="chatMessages"></div>

    <div class="u42-chat-input-area">
      <input type="text" id="chatInput" placeholder="Ask us something...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<!-- Chatbox Script -->
<script src="chatbox.js"></script>

</body>
